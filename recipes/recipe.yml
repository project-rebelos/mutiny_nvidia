# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

###############################################################################
# Budgie Gaming NVIDIA Image
#
# A gaming-optimized Fedora Budgie Atomic image with NVIDIA drivers.
#
# Base: Official Fedora Budgie Atomic (Onyx) — vanilla Fedora, no uBlue layer
# GPU: NVIDIA (RTX 30-series and newer via nvidia-open kmod)
# Desktop: Budgie
# Fedora: 43
#
# NVIDIA driver installation follows the ublue-os/main nvidia-install.sh
# approach: pre-built kmods from ghcr.io/ublue-os/akmods-nvidia-open,
# userspace drivers from the negativo17 repo (NOT RPM Fusion xorg-x11-drv-nvidia).
#
###############################################################################

name: budgie-gaming-nvidia
description: A gaming-optimized Fedora Budgie Atomic desktop image with NVIDIA drivers

base-image: quay.io/fedora-ostree-desktops/budgie-atomic
image-version: 43

modules:

  # =========================================================================
  # 1. REPOSITORIES — Add COPR repos and third-party sources
  #    (RPM Fusion added here; NVIDIA negativo17 repos come from
  #     ublue-os-nvidia-addons RPM in step 2)
  # =========================================================================
  - type: script
    scripts:
      - setup-repos.sh

  # =========================================================================
  # 2. NVIDIA DRIVER INSTALLATION
  #    Uses containerfile snippets to COPY pre-built kmods from the ublue-os
  #    akmods container images, then installs userspace drivers from the
  #    negativo17 repo (which doesn't have the akmod-nvidia dependency chain).
  #    This is the same method used by Bluefin/Aurora/Bazzite.
  # =========================================================================

  # 2a. Copy the nvidia-open akmods container contents
  - type: containerfile
    snippets:
      - COPY --from=ghcr.io/ublue-os/akmods-nvidia-open:main-43 / /tmp/akmods-nvidia

  # 2b. Run the nvidia install script (a single RUN to keep layers clean)
  - type: containerfile
    snippets:
      - RUN /tmp/files/scripts/install-nvidia.sh

  # =========================================================================
  # 3. CORE SYSTEM PACKAGES — Gaming stack and utilities
  #    (installed AFTER nvidia so repos are in the right state)
  # =========================================================================
  - from-file: gaming-packages.yml

  # =========================================================================
  # 4. SYSTEM CONFIG FILES — sysctl, modprobe, udev, etc.
  # =========================================================================
  - type: files
    files:
      - source: system
        destination: /

  # =========================================================================
  # 5. FLATPAK DEFAULTS — Flathub + default apps
  # =========================================================================
  - from-file: flatpaks.yml

  # =========================================================================
  # 6. SYSTEMD UNITS — Enable/disable services
  # =========================================================================
  - from-file: systemd-config.yml

  # =========================================================================
  # 7. CUSTOM JUSTFILES — ujust commands for user convenience
  # =========================================================================
  - type: justfiles
    include:
      - gaming.just

  # =========================================================================
  # 8. POST-INSTALL TWEAKS — Final cleanup and config
  # =========================================================================
  - type: script
    scripts:
      - post-install.sh

  # =========================================================================
  # 9. IMAGE SIGNING
  # =========================================================================
  - type: signing
