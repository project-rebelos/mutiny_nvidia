---
# yaml-language-server: $schema=https://schema.blue-build.org/module-v1.json

# gaming-packages.yml — Core gaming packages and system utilities (NVIDIA variant)
#
# Installed AFTER NVIDIA drivers are already set up by install-nvidia.sh.
# No AMD-specific packages. No bazzite kernel (using stock Fedora kernel
# to match the ublue akmods pre-built NVIDIA kmod).

type: dnf
install:
  allow-erasing: true
  packages:
    # ---- Multimedia Codecs ----
    - ffmpeg
    - gstreamer1-plugins-bad-free
    - gstreamer1-plugins-bad-freeworld
    - gstreamer1-plugins-ugly
    - gstreamer1-vaapi
    - libva-utils

    # ---- Gaming: Vulkan / OpenGL ----
    - vulkan-loader
    - vulkan-tools
    - mesa-vulkan-drivers
    - mesa-dri-drivers
    - mesa-libGL
    - mesa-libEGL

    # ---- Gaming: Performance Overlays & Tools ----
    - mangohud
    - vkBasalt
    - latencyflex-vulkan-layer
    - gamemode
    - gamescope
    - power-profiles-daemon

    # ---- Gaming: Controller Support ----
    - joystick-support
    - steam-devices

    # ---- Networking & VPN ----
    - tailscale

    # ---- Container & Development Tools ----
    - distrobox
    - toolbox
    - podman

    # ---- System Utilities ----
    - ptyxis
    - topgrade
    - just
    - input-remapper
    - libcec

    # ---- File Manager & ROM Properties ----
    - rom-properties-gtk3

    # ---- Webapp Manager ----
    - webapp-manager

    # ---- Fonts ----
    - google-noto-sans-fonts
    - google-noto-emoji-color-fonts
    - liberation-fonts
    - fira-code-fonts
