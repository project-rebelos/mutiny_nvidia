# 90-nvidia.conf — NVIDIA GPU driver configuration
#
# Ensure the NVIDIA driver modules are loaded and nouveau is blacklisted.
# Most of this is handled by kernel arguments, but belt-and-suspenders.
blacklist nouveau
options nouveau modeset=0

# Enable NVIDIA power management for proper suspend/resume.
# This is critical for desktop systems that suspend.
options nvidia NVreg_PreserveVideoMemoryAllocations=1
options nvidia NVreg_TemporaryFilePath=/var/tmp
